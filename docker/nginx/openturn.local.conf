map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream api_up      { server 127.0.0.1:8000; }
upstream ws_up       { server 127.0.0.1:8001; }
upstream remote_up   { server 127.0.0.1:8002; }
upstream front_up    { server 127.0.0.1:3000; }

# Redirecionamento HTTP para HTTPS
server {
    listen 80;
    server_name staging.schoolguard.com.br openturn.local;
    
    server_tokens off;
    
    # Redireciona tudo para HTTPS
    return 301 https://$host$request_uri;
}

# Configuração HTTPS (Win-Acme)
server {
    listen 443 ssl;
    # Nota: http2 foi movido para uma diretiva separada em versões mais recentes do nginx,
    # se você usar nginx >= 1.25.1 descomente a linha abaixo:
    # http2 on;
    # Se for versão mais antiga, altere o listen para: listen 443 ssl http2;
    
    server_name staging.schoolguard.com.br openturn.local;

    server_tokens off;

    # 🔴 ATENÇÃO: Substitua pelos caminhos reais onde o win-acme salvou seus arquivos .pem
    # Dica (Windows): Use barras normais `/` em vez de contrabarras `\` nos caminhos do Nginx
    ssl_certificate     C:/nginx/certs/schoolguard.com.br-chain.pem;
    ssl_certificate_key C:/nginx/certs/schoolguard.com.br-key.pem;

    # Otimizações de SSL/TLS (Segurança Padrão Recomendada)
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;  # about 40000 sessions
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # API backend
    location /api/ {
        proxy_pass http://api_up;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket — Connectors
    location /ws/connectors {
        proxy_pass http://ws_up;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Remote UI Gateway
    location /remote/ {
        proxy_pass http://remote_up;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 600s;
        client_max_body_size 50m;
    }

    # Frontend (Next.js dev server)
    location / {
        proxy_pass http://front_up;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
